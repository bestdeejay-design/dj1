<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Tracks Review</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .track-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        .track-card:hover {
            transform: translateY(-5px);
        }

        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .track-id {
            font-family: 'Courier New', monospace;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            color: #666;
        }

        .track-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-null { background: #fee; color: #c00; }
        .status-empty { background: #ffe0b2; color: #e65100; }
        .status-short { background: #fff3cd; color: #856404; }
        .status-ok { background: #d4edda; color: #155724; }

        .sound-field {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            margin-bottom: 15px;
            font-style: italic;
            line-height: 1.6;
        }

        .sound-placeholder {
            color: #999;
            font-style: italic;
        }

        .audio-player {
            width: 100%;
            margin-bottom: 15px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tag-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
        }

        .no-tags {
            color: #dc3545;
            font-weight: bold;
            padding: 10px;
            background: #f8d7da;
            border-radius: 5px;
        }

        .metadata {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding-top: 15px;
            border-top: 2px solid #f0f0f0;
        }

        .meta-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .meta-label {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 5px;
        }

        .meta-value {
            font-weight: bold;
            color: #333;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.5em;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .stats {
                flex-direction: column;
            }
            
            .track-header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Broken Tracks Review</h1>
            <p>Tracks without tags - manual review needed</p>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="total-count">-</div>
                    <div class="stat-label">Total Tracks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="with-sound">-</div>
                    <div class="stat-label">With Sound</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="without-tags">-</div>
                    <div class="stat-label">Without Tags</div>
                </div>
            </div>
        </header>

        <div id="tracks-container">
            <div class="loading">Loading tracks...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.dj1.ru/api';
        
        // Broken track IDs from database
        const BROKEN_TRACK_IDS = [
            '575df0e4-fba7-4324-86bf-b9e61054e1e6',
            'be66e1e4-447c-422b-a514-8c6d2462402f',
            '9d7367bc-dd5d-4243-afe3-08a4c1d7d057',
            '3d399d3d-ded5-4712-9589-e35a5e234a40',
            'f065df01-8d28-46bc-a36b-0b31e2af0ba0'
        ];

        async function fetchTrack(id) {
            try {
                // Use REST API path pattern from openapi.yaml: /tracks/{id}
                const url = `${API_BASE}/tracks/${id}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        console.log(`Track ${id} not found (404)`);
                        return null;
                    }
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                return data; // TrackDetail object
            } catch (error) {
                console.error(`Error fetching track ${id}:`, error);
                return null;
            }
        }

        function getStatusBadge(sound) {
            if (!sound) return '<span class="track-status status-null">❌ NULL</span>';
            if (sound.trim() === '') return '<span class="track-status status-empty">⚠️ Empty</span>';
            if (sound.length < 20) return `<span class="track-status status-short">⚠️ Short (${sound.length} chars)</span>`;
            return `<span class="track-status status-ok">✅ OK (${sound.length} chars)</span>`;
        }

        function createTrackCard(track) {
            const hasSound = track.sound && track.sound.trim() !== '';
            const soundLength = track.sound ? track.sound.length : 0;
            const wordCount = hasSound ? track.sound.trim().split(/\s+/).length : 0;
            
            return `
                <div class="track-card">
                    <div class="track-header">
                        <div class="track-id">${track.id}</div>
                        ${getStatusBadge(track.sound)}
                    </div>

                    <div class="sound-field">
                        ${hasSound ? `"${escapeHtml(track.sound)}"` : '<span class="sound-placeholder">No sound description</span>'}
                    </div>

                    ${hasSound ? `
                        <audio controls class="audio-player">
                            <source src="${getAudioUrl(track)}" type="audio/mpeg">
                            Your browser does not support the audio element.
                        </audio>
                    ` : ''}

                    <div class="tags-container">
                        ${track.tags && track.tags.length > 0 
                            ? track.tags.map(tag => `<span class="tag-badge">${escapeHtml(tag)}</span>`).join('')
                            : '<div class="no-tags">⚠️ No tags assigned</div>'
                        }
                    </div>

                    <div class="metadata">
                        <div class="meta-item">
                            <div class="meta-label">Sound Length</div>
                            <div class="meta-value">${soundLength} chars</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Word Count</div>
                            <div class="meta-value">${wordCount} words</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Created</div>
                            <div class="meta-value">${formatDate(track.created_at)}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Tag Count</div>
                            <div class="meta-value">${track.tags ? track.tags.length : 0}</div>
                        </div>
                    </div>

                    <div class="actions">
                        <a href="${API_BASE}/tracks/${track.id}" target="_blank" class="btn btn-primary">
                            🔗 View in API
                        </a>
                        ${hasSound ? `
                            <a href="${getAudioUrl(track)}" target="_blank" class="btn btn-secondary">
                                🎵 Open Audio
                            </a>
                        ` : ''}
                        <button onclick="copyId('${track.id}')" class="btn btn-secondary">
                            📋 Copy ID
                        </button>
                    </div>
                </div>
            `;
        }

        function getAudioUrl(track) {
            // Try to extract audio URL from sound field or use placeholder
            if (track.sound && track.sound.includes('http')) {
                const match = track.sound.match(/https?:\/\/[^\s]+/);
                if (match) return match[0];
            }
            return '#';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return 'Unknown';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function copyId(id) {
            navigator.clipboard.writeText(id).then(() => {
                alert('ID copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        async function loadTracks() {
            const container = document.getElementById('tracks-container');
            
            let stats = {
                total: BROKEN_TRACK_IDS.length,
                withSound: 0,
                withoutTags: 0
            };

            const tracks = [];
            for (const id of BROKEN_TRACK_IDS) {
                const track = await fetchTrack(id);
                if (track) {
                    tracks.push(track);
                    if (track.sound && track.sound.trim()) stats.withSound++;
                    if (!track.tags || track.tags.length === 0) stats.withoutTags++;
                }
            }

            // Update stats
            document.getElementById('total-count').textContent = stats.total;
            document.getElementById('with-sound').textContent = stats.withSound;
            document.getElementById('without-tags').textContent = stats.withoutTags;

            // Render tracks
            if (tracks.length === 0) {
                container.innerHTML = '<div class="error">No tracks found or API error</div>';
                return;
            }

            container.innerHTML = tracks.map(createTrackCard).join('');
        }

        // Load on page ready
        document.addEventListener('DOMContentLoaded', loadTracks);
    </script>
</body>
</html>
